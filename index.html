<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon GO IV Scanner PRO</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#1b1f3b,#0b132b);
    color:white;
    display:flex;
    justify-content:center;
}

.container { width:360px; padding:20px; }

.card {
    background:#ffffff10;
    backdrop-filter: blur(10px);
    padding:20px;
    border-radius:15px;
    text-align:center;
}

input {
    width:90%;
    padding:10px;
    margin:5px;
    border:none;
    border-radius:10px;
    text-align:center;
}

button {
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#ff3b3b;
    color:white;
}

img { width:90px; margin-top:10px; }

.bar {
    height:10px;
    border-radius:10px;
    width:0%;
    background:limegreen;
    transition:0.3s;
}

.suggestions {
    background:#00000055;
    margin-top:5px;
    border-radius:10px;
    max-height:120px;
    overflow:auto;
    font-size:12px;
}

.suggestions div {
    padding:5px;
    cursor:pointer;
}

.history { margin-top:20px; }

.item {
    background:#ffffff10;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
    display:flex;
    gap:10px;
    align-items:center;
}

.item img { width:50px; }
</style>
</head>

<body>

<div class="container">

<div class="card">
    <h2>IV Scanner PRO</h2>

    <input id="name" placeholder="Pokémon" oninput="autoSearch()">
    <div class="suggestions" id="suggestions"></div>

    <img id="img">

    <input id="atk" placeholder="ATK (0-15)">
    <input id="def" placeholder="DEF (0-15)">
    <input id="hp" placeholder="HP (0-15)">

    <button onclick="calc()">Calcular</button>

    <div id="result"></div>
    <div class="bar" id="bar"></div>
</div>

<div class="history">
    <h3>Histórico</h3>
    <div id="list"></div>
</div>

</div>

<script>

let cacheImg = "";
let history = JSON.parse(localStorage.getItem("ivs")) || [];

async function autoSearch() {
    let name = document.getElementById("name").value.toLowerCase();

    if (name.length < 2) return;

    try {
        let res = await fetch("https://pokeapi.co/api/v2/pokemon?limit=1000");
        let data = await res.json();

        let matches = data.results
            .filter(p => p.name.startsWith(name))
            .slice(0, 6);

        let box = document.getElementById("suggestions");
        box.innerHTML = "";

        matches.forEach(m => {
            box.innerHTML += `<div onclick="selectPoke('${m.name}')">${m.name}</div>`;
        });

        // busca imagem do primeiro match
        if (matches[0]) loadPokemon(matches[0].name);

    } catch {}
}

async function selectPoke(name) {
    document.getElementById("name").value = name;
    document.getElementById("suggestions").innerHTML = "";
    loadPokemon(name);
}

async function loadPokemon(name) {
    try {
        let res = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
        let data = await res.json();

        document.getElementById("img").src = data.sprites.front_default;

        cacheImg = data.sprites.front_default;
    } catch {}
}

function rank(p) {
    if (p === 100) return "4★";
    if (p >= 80) return "3★";
    if (p >= 50) return "2★";
    if (p > 0) return "1★";
    return "0★";
}

function pvpRank(p) {
    if (p >= 90) return "🔥 Top PvP";
    if (p >= 75) return "👍 Bom PvP";
    return "❌ Ruim PvP";
}

function calc() {

    let name = document.getElementById("name").value;

    let atk = +document.getElementById("atk").value;
    let def = +document.getElementById("def").value;
    let hp = +document.getElementById("hp").value;

    let iv = atk + def + hp;
    let pct = (iv * 100) / 45;

    let item = {
        name,
        iv,
        pct,
        img: cacheImg,
        date: new Date().toLocaleString()
    };

    history.push(item);

    history.sort((a,b)=>b.pct-a.pct);

    localStorage.setItem("ivs", JSON.stringify(history));

    document.getElementById("result").innerHTML =
        `${name}<br>${iv}/45 (${Math.round(pct)}%)<br>${rank(pct)} | ${pvpRank(pct)}`;

    let bar = document.getElementById("bar");
    bar.style.width = pct + "%";

    render();
}

function render() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    history.forEach(p => {
        list.innerHTML += `
        <div class="item">
            <img src="${p.img}">
            <div>
                <b>${p.name}</b><br>
                ${p.iv}/45 (${Math.round(p.pct)}%)<br>
                <small>${p.date}</small>
            </div>
        </div>`;
    });
}

render();

</script>

</body>
</html>
