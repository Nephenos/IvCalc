<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IV Scanner PRO</title>

<style>
:root{
    --bg:#0b132b;
    --card:#ffffff10;
    --accent:#ff3b3b;
    --gold:#ffd700;
}

body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:white;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    background:#111a33;
    height:100vh;
    padding:20px;
    box-sizing:border-box;
    transition:0.3s;
    overflow:hidden;
}

.sidebar.closed{
    width:70px;
}

/* CONTENT */
.content{
    flex:1;
    padding:20px;
}

/* CARD */
.card{
    background:var(--card);
    backdrop-filter: blur(12px);
    padding:20px;
    border-radius:18px;
    max-width:600px;
    display:flex;
    gap:15px;
}

/* IMAGE */
.poke-area{
    text-align:center;
    width:180px;
}

#img{
    width:160px;
    height:160px;
    object-fit:contain;
}

.percent{
    margin-top:8px;
    font-weight:bold;
    color:var(--gold);
}

/* INPUTS */
.inputs{
    flex:1;
}

input{
    width:92%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:10px;
    text-align:center;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:var(--accent);
    color:white;
    cursor:pointer;
}

/* BAR */
.bar{
    height:10px;
    border-radius:10px;
    background:limegreen;
    width:0%;
}

/* GRAPH */
.graph{
    margin-top:15px;
    display:flex;
    flex-direction:column;
    gap:8px;
}

.barStat{
    display:flex;
    align-items:center;
    gap:8px;
}

.label{
    width:40px;
    font-size:12px;
}

.bar2{
    height:10px;
    background:#2c3f77;
    border-radius:8px;
    flex:1;
    overflow:hidden;
}

.fill{
    height:100%;
    background:linear-gradient(90deg,#00c6ff,#0072ff);
    width:0%;
}

/* LIST */
.item{
    background:var(--card);
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    display:flex;
    gap:10px;
    align-items:flex-start;
}

.del{
    width:34px;
    height:34px;
    border-radius:10px;
    border:none;
    background:#ff3b3b;
    color:white;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
}

.flags-list{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:6px;
    font-size:11px;
}
</style>
</head>

<body>

<div class="content">

<!-- CALC -->
<div class="card">

<div class="poke-area">
    <img id="img">
    <div class="percent" id="percent">0% (0/45)</div>
</div>

<div class="inputs">

<input id="name" placeholder="Pokémon" oninput="loadAuto()">

<input id="atk" placeholder="ATK (0-15)" oninput="updateGraph()">
<input id="def" placeholder="DEF (0-15)" oninput="updateGraph()">
<input id="hp" placeholder="HP (0-15)" oninput="updateGraph()">

<button onclick="calc()">Salvar IV</button>

<div class="graph">
    <div class="barStat">
        <div class="label">ATK</div>
        <div class="bar2"><div class="fill" id="atkBar"></div></div>
    </div>

    <div class="barStat">
        <div class="label">DEF</div>
        <div class="bar2"><div class="fill" id="defBar"></div></div>
    </div>

    <div class="barStat">
        <div class="label">HP</div>
        <div class="bar2"><div class="fill" id="hpBar"></div></div>
    </div>
</div>

</div>

</div>

<!-- LISTA -->
<div id="list" style="display:none"></div>

</div>

<script>

let cacheImg="";
let history=JSON.parse(localStorage.getItem("ivs"))||[];

/* LOAD IMAGE HD */
async function loadAuto(){
    let name=document.getElementById("name").value.toLowerCase();
    if(name.length<2) return;

    try{
        let res=await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
        let data=await res.json();

        let img=data.sprites.other["official-artwork"].front_default;

        document.getElementById("img").src=img;
        cacheImg=img;

    }catch{}
}

/* GRAPH UPDATE */
function updateGraph(){

    let atk=Math.min(+document.getElementById("atk").value||0,15);
    let def=Math.min(+document.getElementById("def").value||0,15);
    let hp=Math.min(+document.getElementById("hp").value||0,15);

    document.getElementById("atkBar").style.width=(atk/15*100)+"%";
    document.getElementById("defBar").style.width=(def/15*100)+"%";
    document.getElementById("hpBar").style.width=(hp/15*100)+"%";

    let total=atk+def+hp;
    document.getElementById("percent").innerText=
        `${Math.round(total/45*100)}% (${total}/45)`;
}

/* CALC */
function calc(){

    let name=document.getElementById("name").value;

    let atk=+document.getElementById("atk").value;
    let def=+document.getElementById("def").value;
    let hp=+document.getElementById("hp").value;

    let total=atk+def+hp;
    let pct=(total*100)/45;

    let item={
        name,
        atk,def,hp,
        total,
        pct,
        img:cacheImg
    };

    history.push(item);
    localStorage.setItem("ivs",JSON.stringify(history));

    updateGraph();
}

/* RENDER LIST */
function renderList(){
    let box=document.getElementById("list");
    box.innerHTML="";

    history.forEach((p,i)=>{

        box.innerHTML+=`
        <div class="item">

            <img src="${p.img}" width="60">

            <div style="flex:1">
                <b>${p.name}</b><br>
                ${p.total}/45 (${Math.round(p.pct)}%)

                <div class="flags-list">
                    ATK ${p.atk} | DEF ${p.def} | HP ${p.hp}
                </div>
            </div>

        </div>`;
    });
}

renderList();

</script>

</body>
</html>
