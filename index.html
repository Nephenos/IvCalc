<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IV Scanner PRO</title>

<style>
:root{
    --bg:#0b132b;
    --card:#ffffff10;
    --accent:#ff3b3b;
    --gold:#ffd700;
}

body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:white;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    background:#111a33;
    height:100vh;
    padding:20px;
    box-sizing:border-box;
    transition:0.3s;
    overflow:hidden;
}

.sidebar.closed{
    width:70px;
}

/* HEADER */
.sidebar h2{
    color:var(--gold);
    font-size:16px;
    transition:0.3s;
}

.sidebar.closed h2{
    opacity:0;
    height:0;
}

/* MENU */
.menu div{
    padding:12px;
    margin:8px 0;
    background:#1b2a52;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
    display:flex;
    align-items:center;
    gap:8px;
}

.sidebar.closed .menu span{
    display:none;
}

/* TOGGLE */
.toggle{
    background:#ff3b3b;
    border:none;
    color:white;
    padding:8px;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:10px;
    width:100%;
}

/* CONTENT */
.content{
    flex:1;
    padding:20px;
}

/* CARD */
.card{
    background:var(--card);
    backdrop-filter: blur(12px);
    padding:20px;
    border-radius:18px;
    max-width:520px;
    display:flex;
    gap:15px;
}

/* IMAGE */
.poke-area{
    text-align:center;
    width:180px;
}

#img{
    width:160px;
    height:160px;
    object-fit:contain;
}

.percent{
    margin-top:8px;
    font-weight:bold;
    color:var(--gold);
}

/* INPUTS */
.inputs{
    flex:1;
}

input{
    width:92%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:10px;
    text-align:center;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:var(--accent);
    color:white;
    cursor:pointer;
}

/* BAR */
.bar{
    height:10px;
    border-radius:10px;
    background:limegreen;
    width:0%;
}

/* ITEM */
.item{
    background:var(--card);
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    display:flex;
    gap:10px;
    align-items:flex-start;
}

/* DELETE */
.del{
    width:34px;
    height:34px;
    border-radius:10px;
    border:none;
    background:#ff3b3b;
    color:white;
    font-weight:bold;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* FLAGS */
.flags-list{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:6px;
    font-size:11px;
}

.flags-list label{
    display:flex;
    align-items:center;
    gap:4px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<button class="toggle" onclick="toggleMenu()">☰</button>

<h2>IV Scanner</h2>

<div class="menu">

<div onclick="show('calc')">
    <span>🧮 Calculadora</span>
</div>

<div onclick="show('list')">
    <span>📋 Lista</span>
</div>

</div>
</div>

<!-- CONTENT -->
<div class="content">

<!-- CALC -->
<div id="calc">

<div class="card">

<div class="poke-area">
    <img id="img">
    <div class="percent" id="percent">0% (0/45)</div>
</div>

<div class="inputs">

<input id="name" placeholder="Pokémon" oninput="search()">

<input id="atk" placeholder="ATK (0-15)">
<input id="def" placeholder="DEF (0-15)">
<input id="hp" placeholder="HP (0-15)">

<button onclick="calc()">Calcular</button>

<div class="bar" id="bar"></div>

</div>

</div>

</div>

<!-- LISTA -->
<div id="list" style="display:none">

<h2>Lista de Pokémons</h2>
<button onclick="clearAll()">🗑️ Limpar tudo</button>

<div id="history"></div>

</div>

</div>

<script>

let cacheImg="";
let history=JSON.parse(localStorage.getItem("ivs"))||[];

/* TOGGLE MENU */
function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("closed");
}

/* SHOW */
function show(p){
    document.getElementById("calc").style.display=p==="calc"?"block":"none";
    document.getElementById("list").style.display=p==="list"?"block":"none";
    render();
}

/* LOAD NORMAL + SHINY */
async function load(name, shiny=false){
    try{
        let res=await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
        let data=await res.json();

        let img = shiny
        ? data.sprites.other["official-artwork"].front_shiny
        : data.sprites.other["official-artwork"].front_default;

        document.getElementById("img").src=img;
        cacheImg=img;

    }catch{}
}

/* SEARCH */
async function search(){
    let name=document.getElementById("name").value.toLowerCase();
    if(name.length<2) return;

    load(name,false);
}

/* CALC */
function calc(){

    let name=document.getElementById("name").value;

    let atk=+document.getElementById("atk").value;
    let def=+document.getElementById("def").value;
    let hp=+document.getElementById("hp").value;

    let iv=atk+def+hp;
    let pct=(iv*100)/45;

    let item={
        name,
        iv,
        pct,
        img:cacheImg,
        shiny:false,
        shadow:false,
        purified:false,
        lucky:false,
        mega:false,
        gigantamax:false,
        dynamax:false,
        date:new Date().toLocaleString()
    };

    history.push(item);
    history.sort((a,b)=>b.pct-a.pct);

    localStorage.setItem("ivs",JSON.stringify(history));

    document.getElementById("percent").innerText=
        `${Math.round(pct)}% (${iv}/45)`;

    document.getElementById("bar").style.width=pct+"%";

    render();
}

/* UPDATE FLAGS + SHINY FIX */
function updateFlag(i,key,val){

    history[i][key]=val;

    // 🔥 CORREÇÃO SHINY IMAGEM
    if(key==="shiny"){
        load(history[i].name,val).then(()=>{

            history[i].img=cacheImg;
            localStorage.setItem("ivs",JSON.stringify(history));
            render();

        });
        return;
    }

    localStorage.setItem("ivs",JSON.stringify(history));
    render();
}

/* DELETE */
function del(i){
    history.splice(i,1);
    localStorage.setItem("ivs",JSON.stringify(history));
    render();
}

/* CLEAR */
function clearAll(){
    history=[];
    localStorage.removeItem("ivs");
    render();
}

/* RENDER */
function render(){

    let box=document.getElementById("history");
    if(!box) return;

    box.innerHTML="";

    history.forEach((p,i)=>{

        box.innerHTML+=`
        <div class="item">

            <img src="${p.img}" width="55">

            <div style="flex:1">

                <b>${p.name}</b><br>
                ${p.iv}/45 (${Math.round(p.pct)}%)<br>

                <div class="flags-list">

                    <label><input type="checkbox" onchange="updateFlag(${i},'shiny',this.checked)" ${p.shiny?'checked':''}>⭐</label>
                    <label><input type="checkbox" onchange="updateFlag(${i},'shadow',this.checked)" ${p.shadow?'checked':''}>🌑</label>
                    <label><input type="checkbox" onchange="updateFlag(${i},'purified',this.checked)" ${p.purified?'checked':''}>💠</label>
                    <label><input type="checkbox" onchange="updateFlag(${i},'lucky',this.checked)" ${p.lucky?'checked':''}>🍀</label>
                    <label><input type="checkbox" onchange="updateFlag(${i},'mega',this.checked)" ${p.mega?'checked':''}>⚡</label>
                    <label><input type="checkbox" onchange="updateFlag(${i},'gigantamax',this.checked)" ${p.gigantamax?'checked':''}>🏔️</label>
                    <label><input type="checkbox" onchange="updateFlag(${i},'dynamax',this.checked)" ${p.dynamax?'checked':''}>💥</label>

                </div>

            </div>

            <button class="del" onclick="del(${i})">✕</button>

        </div>`;
    });
}

render();

</script>

</body>
</html>
