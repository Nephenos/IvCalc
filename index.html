<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IV Scanner PRO</title>

<style>
:root{
    --bg:#0b132b;
    --card:#ffffff10;
    --accent:#ff3b3b;
    --gold:#ffd700;
}

body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:white;
    display:flex;
}

/* SIDEBAR RETRÁTIL */
.sidebar{
    width:220px;
    background:#111a33;
    height:100vh;
    padding:20px;
    box-sizing:border-box;
    transition:0.3s;
    overflow:hidden;
}

.sidebar.closed{
    width:60px;
}

.sidebar h2{
    color:var(--gold);
    font-size:16px;
}

.menu div{
    padding:12px;
    margin:8px 0;
    background:#1b2a52;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
}

.menu div:hover{
    background:#2c3f77;
}

/* TOGGLE BTN */
.toggle{
    background:#ff3b3b;
    border:none;
    color:white;
    padding:8px;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:10px;
}

/* CONTENT */
.content{
    flex:1;
    padding:20px;
}

/* CALC LAYOUT */
.calc-box{
    display:flex;
    gap:15px;
}

.card{
    background:var(--card);
    backdrop-filter: blur(12px);
    padding:20px;
    border-radius:18px;
    max-width:500px;
    display:flex;
    gap:15px;
}

/* IMAGE AREA */
.poke-area{
    text-align:center;
    width:150px;
}

#img{
    width:120px;
}

.percent{
    margin-top:8px;
    font-weight:bold;
    color:var(--gold);
}

/* INPUT AREA */
.inputs{
    flex:1;
}

input{
    width:92%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:10px;
    text-align:center;
}

button.calc{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:var(--accent);
    color:white;
    font-size:16px;
    cursor:pointer;
}

/* RESULT */
.result{
    margin-top:10px;
    font-weight:bold;
}

/* BAR */
.bar{
    height:10px;
    border-radius:10px;
    background:limegreen;
    width:0%;
}

/* LISTA */
.item{
    background:var(--card);
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    display:flex;
    align-items:center;
    gap:10px;
}

/* DELETE CENTRALIZADO */
.del{
    width:34px;
    height:34px;
    border-radius:10px;
    border:none;
    background:#ff3b3b;
    color:white;
    font-weight:bold;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* CHECKBOX HORIZONTAL */
.flags-list{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:5px;
}

.flags-list label{
    display:flex;
    align-items:center;
    gap:4px;
    font-size:11px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<button class="toggle" onclick="toggleMenu()">☰</button>

<h2>IV Scanner</h2>

<div class="menu">
<div onclick="show('calc')">🧮 Calc</div>
<div onclick="show('list')">📋 Lista</div>
</div>

</div>

<!-- CONTENT -->
<div class="content">

<!-- CALC -->
<div id="calc">

<div class="card">

<!-- IMAGEM -->
<div class="poke-area">
    <img id="img">
    <div class="percent" id="percent">0%</div>
</div>

<!-- INPUTS -->
<div class="inputs">

<input id="name" placeholder="Pokémon" oninput="search()">

<input id="atk" placeholder="ATK (0-15)">
<input id="def" placeholder="DEF (0-15)">
<input id="hp" placeholder="HP (0-15)">

<button class="calc" onclick="calc()">Calcular IV</button>

<div class="result" id="result"></div>
<div class="bar" id="bar"></div>

</div>

</div>

</div>

<!-- LISTA -->
<div id="list" style="display:none">

<h2>Lista de Pokémons</h2>
<button onclick="clearAll()">🗑️ Limpar tudo</button>

<div id="history"></div>

</div>

</div>

<script>

let cacheImg="";
let history=JSON.parse(localStorage.getItem("ivs"))||[];

/* MENU */
function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("closed");
}

function show(p){
    document.getElementById("calc").style.display=p==="calc"?"block":"none";
    document.getElementById("list").style.display=p==="list"?"block":"none";
    render();
}

/* CAPITALIZE */
function cap(str){
    return str.charAt(0).toUpperCase()+str.slice(1);
}

/* SEARCH */
async function search(){
    let name=document.getElementById("name").value.toLowerCase();
    if(name.length<2) return;

    try{
        let res=await fetch("https://pokeapi.co/api/v2/pokemon?limit=1000");
        let data=await res.json();

        let list=data.results.filter(p=>p.name.startsWith(name)).slice(0,5);

        if(list[0]) load(list[0].name,false);

    }catch{}
}

/* LOAD IMG (BULBAPEDIA STYLE FALLBACK) */
async function load(name,shiny){
    try{
        let res=await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
        let data=await res.json();

        let img=shiny?data.sprites.front_shiny:data.sprites.front_default;

        document.getElementById("img").src=img;
        cacheImg=img;

    }catch{
        let fallback=`https://bulbapedia.bulbagarden.net/wiki/File:${name}_MS.png`;
        document.getElementById("img").src=fallback;
        cacheImg=fallback;
    }
}

/* CALC */
function calc(){

    let name=cap(document.getElementById("name").value);

    let atk=+document.getElementById("atk").value;
    let def=+document.getElementById("def").value;
    let hp=+document.getElementById("hp").value;

    let iv=atk+def+hp;
    let pct=(iv*100)/45;

    let item={
        name,
        iv,
        pct,
        img:cacheImg,
        shiny:false,
        shadow:false,
        purified:false,
        lucky:false,
        mega:false,
        gigantamax:false,
        dynamax:false,
        date:new Date().toLocaleString()
    };

    history.push(item);
    history.sort((a,b)=>b.pct-a.pct);

    localStorage.setItem("ivs",JSON.stringify(history));

    document.getElementById("percent").innerText=Math.round(pct)+"%";
    document.getElementById("result").innerText=`${name} — ${iv}/45`;

    document.getElementById("bar").style.width=pct+"%";

    render();
}

/* UPDATE FLAGS */
function updateFlag(i,key,val){
    history[i][key]=val;
    localStorage.setItem("ivs",JSON.stringify(history));
    render();
}

/* DELETE */
function del(i){
    history.splice(i,1);
    localStorage.setItem("ivs",JSON.stringify(history));
    render();
}

/* CLEAR */
function clearAll(){
    history=[];
    localStorage.removeItem("ivs");
    render();
}

/* RENDER */
function render(){

    let box=document.getElementById("history");
    if(!box) return;

    box.innerHTML="";

    history.forEach((p,i)=>{

        box.innerHTML+=`
        <div class="item">

            <img src="${p.img}" width="50">

            <div style="flex:1">

                <b>${p.name}</b><br>
                ${p.iv}/45 (${Math.round(p.pct)}%)<br>

                <div class="flags-list">

                    <label><input type="checkbox" onchange="updateFlag(${i},'shiny',this.checked)" ${p.shiny?'checked':''}>⭐</label>
                    <label><input type="checkbox" onchange="updateFlag(${i},'shadow',this.checked)" ${p.shadow?'checked':''}>🌑</label>
                    <label><input type="checkbox" onchange="updateFlag(${i},'purified',this.checked)" ${p.purified?'checked':''}>💠</label>
                    <label><input type="checkbox" onchange="updateFlag(${i},'lucky',this.checked)" ${p.lucky?'checked':''}>🍀</label>
                    <label><input type="checkbox" onchange="updateFlag(${i},'mega',this.checked)" ${p.mega?'checked':''}>⚡</label>
                    <label><input type="checkbox" onchange="updateFlag(${i},'gigantamax',this.checked)" ${p.gigantamax?'checked':''}>🏔️</label>
                    <label><input type="checkbox" onchange="updateFlag(${i},'dynamax',this.checked)" ${p.dynamax?'checked':''}>💥</label>

                </div>

            </div>

            <button class="del" onclick="del(${i})">✕</button>

        </div>`;
    });
}

render();

</script>

</body>
</html>
