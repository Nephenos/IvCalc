<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IV Calculator</title>
<style>
:root{--bg:#0b132b;--panel:#111a33;--card:#ffffff12;--accent:#ff3b3b;--gold:#ffd700}
*{box-sizing:border-box} body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:#fff;display:flex}
.sidebar{width:220px;background:var(--panel);height:100vh;padding:16px;transition:.3s;overflow:hidden}
.sidebar.closed{width:70px}.sidebar.closed h2,.sidebar.closed .text{display:none}
.menu-item{display:flex;align-items:center;gap:10px;padding:12px;margin:8px 0;background:#1b2a52;border-radius:10px;cursor:pointer}
.sidebar.closed .menu-item{justify-content:center}
.content{flex:1;padding:20px}
.card{background:var(--card);padding:20px;border-radius:18px;display:flex;gap:15px;max-width:700px}
.poke{width:220px;text-align:center}
#img{width:180px;height:180px;object-fit:contain}
.percent{color:var(--gold);font-weight:bold;margin-top:8px}
.track{height:12px;background:#233;border-radius:99px;margin-top:8px;overflow:hidden}
.bar{height:100%;width:0;background:linear-gradient(90deg,#4ade80,#22c55e)}
.inputs{flex:1}
input{width:100%;padding:10px;border-radius:10px;border:none;margin:6px 0}
button{padding:10px 12px;border:none;border-radius:10px;background:var(--accent);color:#fff;cursor:pointer}
#history .item{display:flex;gap:10px;background:var(--card);padding:10px;border-radius:12px;margin-top:10px}
.flags{display:flex;flex-wrap:wrap;gap:8px;font-size:12px}
.del{margin-left:auto;width:34px;height:34px;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<div class="sidebar" id="sidebar">
<button onclick="toggleMenu()">☰</button>
<h2>IV Calculator</h2>
<div class="menu-item" onclick="showTab('calc')"><span>🧮</span><span class="text">Calculadora</span></div>
<div class="menu-item" onclick="showTab('list')"><span>📋</span><span class="text">Lista</span></div>
</div>
<div class="content">
<div id="calcTab">
<div class="card">
<div class="poke">
<img id="img">
<div class="percent" id="percent">0% (0/45)</div>
<div class="track"><div class="bar" id="bar"></div></div>
</div>
<div class="inputs">
<input id="name" placeholder="Pokémon" oninput="previewPokemon()">
<input id="atk" type="number" min="0" max="15" placeholder="ATK">
<input id="def" type="number" min="0" max="15" placeholder="DEF">
<input id="hp" type="number" min="0" max="15" placeholder="HP">
<button onclick="calc()">Calcular</button>
</div>
</div>
</div>
<div id="listTab" style="display:none">
<h2>Lista de Pokémons</h2>
<button onclick="clearAll()">🗑️ Limpar tudo</button>
<div id="history"></div>
</div>
</div>
<script>
let historyData=JSON.parse(localStorage.getItem('ivs')||'[]');
let currentImg='';

function toggleMenu(){sidebar.classList.toggle('closed')}
function showTab(t){calcTab.style.display=t==='calc'?'block':'none';listTab.style.display=t==='list'?'block':'none';render()}

async function artwork(name, shiny=false){
 const r=await fetch(`https://pokeapi.co/api/v2/pokemon/${name.toLowerCase()}`);
 const d=await r.json();
 return shiny ? (d.sprites.front_shiny||d.sprites.other['official-artwork'].front_default)
              : d.sprites.other['official-artwork'].front_default;
}
async function previewPokemon(){
 let n=name.value.trim(); if(n.length<2) return;
 try{ currentImg=await artwork(n,false); img.src=currentImg; }catch(e){}
}
function cap(s){return s? s.charAt(0).toUpperCase()+s.slice(1).toLowerCase():s}

function calc(){
 const a=+atk.value||0,d=+def.value||0,h=+hp.value||0,total=a+d+h,pct=(total/45)*100;
 percent.textContent=`${pct.toFixed(0)}% (${total}/45)`;
 bar.style.width=pct+'%';
 historyData.push({name:cap(name.value),iv:total,pct,img:currentImg,shiny:false,shadow:false,purified:false,lucky:false,mega:false,gigantamax:false,dynamax:false});
 historyData.sort((x,y)=>y.pct-x.pct);
 localStorage.setItem('ivs',JSON.stringify(historyData));
 render();
}
async function updateFlag(i,key,val){
 historyData[i][key]=val;
 if(key==='shiny'){
   try{historyData[i].img=await artwork(historyData[i].name,val);}catch(e){}
 }
 localStorage.setItem('ivs',JSON.stringify(historyData));
 render();
}
function delItem(i){historyData.splice(i,1);localStorage.setItem('ivs',JSON.stringify(historyData));render()}
function clearAll(){historyData=[];localStorage.removeItem('ivs');render()}

function render(){
 history.innerHTML='';
 historyData.forEach((p,i)=>{
  history.innerHTML+=`<div class="item">
  <img src="${p.img}" width="60">
  <div style="flex:1"><b>${p.name}</b><br>${p.iv}/45 (${Math.round(p.pct)}%)
  <div class="flags">
  <label><input type="checkbox" ${p.shiny?'checked':''} onchange="updateFlag(${i},'shiny',this.checked)">⭐</label>
  <label><input type="checkbox" ${p.shadow?'checked':''} onchange="updateFlag(${i},'shadow',this.checked)">🌑</label>
  <label><input type="checkbox" ${p.purified?'checked':''} onchange="updateFlag(${i},'purified',this.checked)">💠</label>
  <label><input type="checkbox" ${p.lucky?'checked':''} onchange="updateFlag(${i},'lucky',this.checked)">🍀</label>
  <label><input type="checkbox" ${p.mega?'checked':''} onchange="updateFlag(${i},'mega',this.checked)">⚡</label>
  <label><input type="checkbox" ${p.gigantamax?'checked':''} onchange="updateFlag(${i},'gigantamax',this.checked)">🏔️</label>
  <label><input type="checkbox" ${p.dynamax?'checked':''} onchange="updateFlag(${i},'dynamax',this.checked)">💥</label>
  </div></div>
  <button class="del" onclick="delItem(${i})">✕</button></div>`;
 });
}
render();
</script>
</body></html>
