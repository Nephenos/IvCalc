<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IV Calculator Pokémon GO</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1b1f3b, #0b132b);
    color: white;
    display: flex;
    justify-content: center;
}

.container {
    width: 350px;
    padding: 20px;
}

.card {
    background: #ffffff10;
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

input {
    width: 90%;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    text-align: center;
}

button {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #ff3b3b;
    color: white;
    font-size: 16px;
    margin-top: 10px;
}

.bar {
    height: 10px;
    background: limegreen;
    width: 0%;
    transition: 0.3s;
    border-radius: 10px;
}

.result {
    margin-top: 10px;
    font-size: 14px;
}

img {
    width: 80px;
}

.history {
    margin-top: 20px;
}

.item {
    background: #ffffff10;
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.item img {
    width: 50px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
    <h2>IV Calculator</h2>

    <input type="text" id="name" placeholder="Nome do Pokémon">
    <input type="number" id="atk" placeholder="ATK (0-15)">
    <input type="number" id="def" placeholder="DEF (0-15)">
    <input type="number" id="hp" placeholder="HP (0-15)">

    <button onclick="calcular()">Calcular</button>

    <div class="result" id="result"></div>
    <div class="bar" id="bar"></div>
</div>

<div class="history">
    <h3>Histórico</h3>
    <div id="lista"></div>
</div>

</div>

<script>

let historico = JSON.parse(localStorage.getItem("ivs")) || [];

async function getPokemonImage(name) {
    try {
        let res = await fetch(`https://pokeapi.co/api/v2/pokemon/${name.toLowerCase()}`);
        let data = await res.json();
        return data.sprites.front_default;
    } catch {
        return "";
    }
}

function rankIV(pct) {
    if (pct === 100) return "4★";
    if (pct >= 80) return "3★";
    if (pct >= 50) return "2★";
    if (pct > 0) return "1★";
    return "0★";
}

async function calcular() {
    let name = document.getElementById("name").value;
    let atk = Number(document.getElementById("atk").value);
    let def = Number(document.getElementById("def").value);
    let hp = Number(document.getElementById("hp").value);

    let ivs = atk + def + hp;
    let pct = (ivs * 100) / 45;
    let rank = rankIV(pct);

    let img = await getPokemonImage(name);

    let item = {
        name,
        atk,
        def,
        hp,
        ivs,
        pct,
        rank,
        img
    };

    historico.push(item);

    // ordenar do maior IV para o menor
    historico.sort((a, b) => b.pct - a.pct);

    localStorage.setItem("ivs", JSON.stringify(historico));

    document.getElementById("result").innerHTML =
        `<b>${name}</b><br>${ivs}/45 (${Math.round(pct)}%) - ${rank}`;

    document.getElementById("bar").style.width = pct + "%";

    render();
}

function render() {
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    historico.forEach(p => {
        lista.innerHTML += `
        <div class="item">
            <img src="${p.img}">
            <div>
                <b>${p.name}</b><br>
                ${p.ivs}/45 (${Math.round(p.pct)}%) - ${p.rank}
            </div>
        </div>`;
    });
}

render();

</script>

</body>
</html>
