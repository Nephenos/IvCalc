<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon GO IV App</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: #0b132b;
    color:white;
    display:flex;
}

/* MENU LATERAL */
.sidebar {
    width:200px;
    background:#111a33;
    height:100vh;
    padding:20px;
    box-sizing:border-box;
}

.sidebar h2 {
    color:#ffd700;
    font-size:18px;
}

.menu {
    margin-top:20px;
}

.menu div {
    padding:10px;
    margin:5px 0;
    cursor:pointer;
    background:#1b2a52;
    border-radius:8px;
}

.menu div:hover {
    background:#2a3f77;
}

/* CONTEUDO */
.content {
    flex:1;
    padding:20px;
}

.card {
    background:#ffffff10;
    backdrop-filter: blur(10px);
    padding:20px;
    border-radius:15px;
    max-width:400px;
}

/* INPUTS */
input {
    width:90%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:10px;
    text-align:center;
}

button {
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#ff3b3b;
    color:white;
    cursor:pointer;
}

/* IMAGEM */
img {
    width:90px;
    margin-top:10px;
}

/* RESULTADO */
.result {
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
}

/* BARRA */
.bar {
    height:10px;
    border-radius:10px;
    background:limegreen;
    width:0%;
    transition:0.3s;
}

/* LISTA */
.item {
    background:#ffffff10;
    margin:10px 0;
    padding:10px;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.item img {
    width:50px;
}

.del {
    background:red;
    border:none;
    color:white;
    padding:5px 8px;
    border-radius:6px;
    cursor:pointer;
}

.deleteAll {
    background:#ff5555;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="sidebar">
<h2>Pokémon IV</h2>

<div class="menu">
    <div onclick="show('calc')">🧮 Calculadora</div>
    <div onclick="show('list')">📋 Lista</div>
</div>
</div>

<!-- CONTEUDO -->
<div class="content">

<!-- CALCULADORA -->
<div id="calc">

<div class="card">
    <h2>IV Calculator</h2>

    <input id="name" placeholder="Pokémon" oninput="search()">
    <div id="suggest"></div>

    <img id="img">

    <input id="atk" placeholder="ATK (0-15)">
    <input id="def" placeholder="DEF (0-15)">
    <input id="hp" placeholder="HP (0-15)">

    <button onclick="calc()">Calcular</button>

    <div class="result" id="result"></div>
    <div class="bar" id="bar"></div>
</div>

</div>

<!-- LISTA -->
<div id="list" style="display:none">

<h2>Histórico</h2>

<button class="deleteAll" onclick="clearAll()">🗑️ Apagar tudo</button>

<div id="history"></div>

</div>

</div>

<script>

let cacheImg = "";
let history = JSON.parse(localStorage.getItem("ivs")) || [];

/* MENU */
function show(page){
    document.getElementById("calc").style.display = page === "calc" ? "block":"none";
    document.getElementById("list").style.display = page === "list" ? "block":"none";
    render();
}

/* BUSCA POKEMON */
async function search(){
    let name = document.getElementById("name").value.toLowerCase();
    if(name.length < 2) return;

    try{
        let res = await fetch("https://pokeapi.co/api/v2/pokemon?limit=1000");
        let data = await res.json();

        let list = data.results.filter(p => p.name.startsWith(name)).slice(0,5);

        let box = document.getElementById("suggest");
        box.innerHTML = "";

        list.forEach(p=>{
            box.innerHTML += `<div onclick="selectPoke('${p.name}')">${p.name}</div>`;
        });

        if(list[0]) load(list[0].name);

    }catch{}
}

async function selectPoke(name){
    document.getElementById("name").value = name;
    document.getElementById("suggest").innerHTML = "";
    load(name);
}

/* CARREGA IMAGEM */
async function load(name){
    try{
        let res = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
        let data = await res.json();

        document.getElementById("img").src = data.sprites.front_default;
        cacheImg = data.sprites.front_default;

    }catch{}
}

/* CALCULO */
function calc(){

    let name = document.getElementById("name").value;
    let atk = +document.getElementById("atk").value;
    let def = +document.getElementById("def").value;
    let hp = +document.getElementById("hp").value;

    let iv = atk+def+hp;
    let pct = (iv*100)/45;

    let item = {
        name,
        iv,
        pct,
        img: cacheImg,
        date: new Date().toLocaleString()
    };

    history.push(item);
    history.sort((a,b)=>b.pct-a.pct);

    localStorage.setItem("ivs", JSON.stringify(history));

    document.getElementById("result").innerHTML =
        `${name} — ${iv}/45 (${Math.round(pct)}%)`;

    document.getElementById("bar").style.width = pct + "%";

    render();
}

/* LISTA */
function render(){
    let box = document.getElementById("history");
    if(!box) return;

    box.innerHTML = "";

    history.forEach((p,i)=>{
        box.innerHTML += `
        <div class="item">
            <img src="${p.img}">
            <div>
                <b>${p.name}</b><br>
                ${p.iv}/45 (${Math.round(p.pct)}%)<br>
                <small>${p.date}</small>
            </div>
            <button class="del" onclick="del(${i})">X</button>
        </div>`;
    });
}

/* DELETE */
function del(i){
    history.splice(i,1);
    localStorage.setItem("ivs", JSON.stringify(history));
    render();
}

/* CLEAR ALL */
function clearAll(){
    history = [];
    localStorage.removeItem("ivs");
    render();
}

render();

</script>

</body>
</html>
