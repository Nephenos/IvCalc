<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IV Scanner PRO</title>

<style>
:root{
    --bg:#0b132b;
    --card:#ffffff10;
    --accent:#ff3b3b;
    --gold:#ffd700;
}

body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:white;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    background:#111a33;
    height:100vh;
    padding:20px;
    box-sizing:border-box;
}

.sidebar h2{
    color:var(--gold);
    margin-bottom:20px;
}

.menu div{
    padding:12px;
    margin:8px 0;
    background:#1b2a52;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}

.menu div:hover{
    background:#2c3f77;
}

/* CONTENT */
.content{
    flex:1;
    padding:20px;
}

/* CARD */
.card{
    background:var(--card);
    backdrop-filter: blur(12px);
    padding:20px;
    border-radius:18px;
    max-width:420px;
}

/* INPUT */
input{
    width:92%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:10px;
    text-align:center;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:var(--accent);
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    filter:brightness(1.1);
}

/* IMAGE */
#img{
    width:90px;
    margin-top:10px;
}

/* RESULT */
.result{
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
}

/* BAR */
.bar{
    height:10px;
    border-radius:10px;
    background:limegreen;
    width:0%;
    transition:0.3s;
}

/* TAGS */
.tag{
    font-size:12px;
    margin:3px 0;
    display:flex;
    align-items:center;
    gap:6px;
}

/* LIST ITEM */
.item{
    background:var(--card);
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    display:flex;
    align-items:center;
    gap:10px;
}

/* DELETE BUTTON */
.del{
    margin-left:auto;
    width:35px;
    height:35px;
    border-radius:10px;
    border:none;
    background:#ff3b3b;
    color:white;
    cursor:pointer;
}

/* CHECKBOX AREA */
.flags label{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    margin:4px 0;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>IV Scanner</h2>

<div class="menu">
<div onclick="show('calc')">🧮 Calculadora</div>
<div onclick="show('list')">📋 Lista</div>
</div>
</div>

<!-- CONTENT -->
<div class="content">

<!-- CALCULADORA -->
<div id="calc">

<div class="card">
<h2>Pokémon GO IV</h2>

<input id="name" placeholder="Pokémon" oninput="search()">
<div id="suggest"></div>

<img id="img">

<input id="atk" placeholder="ATK (0-15)">
<input id="def" placeholder="DEF (0-15)">
<input id="hp" placeholder="HP (0-15)">

<div class="flags">
<label><input type="checkbox" id="shiny"> ⭐ Shiny</label>
<label><input type="checkbox" id="shadow"> 🌑 Sombrio</label>
<label><input type="checkbox" id="purified"> 💠 Purificado</label>
<label><input type="checkbox" id="lucky"> 🍀 Sortudo</label>
<label><input type="checkbox" id="mega"> ⚡ Mega</label>
<label><input type="checkbox" id="gigantamax"> 🏔️ Gigantamax</label>
<label><input type="checkbox" id="dynamax"> 💥 Dinamax</label>
</div>

<button onclick="calc()">Calcular IV</button>

<div class="result" id="result"></div>
<div class="bar" id="bar"></div>

</div>

</div>

<!-- LISTA -->
<div id="list" style="display:none">

<h2>Histórico</h2>
<button onclick="clearAll()">🗑️ Limpar tudo</button>

<div id="history"></div>

</div>

</div>

<script>

let cacheImg = "";
let history = JSON.parse(localStorage.getItem("ivs")) || [];

/* MENU */
function show(p){
    document.getElementById("calc").style.display = p==="calc"?"block":"none";
    document.getElementById("list").style.display = p==="list"?"block":"none";
    render();
}

/* SEARCH */
async function search(){
    let name = document.getElementById("name").value.toLowerCase();
    if(name.length<2) return;

    try{
        let res = await fetch("https://pokeapi.co/api/v2/pokemon?limit=1000");
        let data = await res.json();

        let list = data.results.filter(p=>p.name.startsWith(name)).slice(0,5);

        let box = document.getElementById("suggest");
        box.innerHTML="";

        list.forEach(p=>{
            box.innerHTML += `<div onclick="selectPoke('${p.name}')">${p.name}</div>`;
        });

        if(list[0]) load(list[0].name,false);

    }catch{}
}

function selectPoke(name){
    document.getElementById("name").value=name;
    document.getElementById("suggest").innerHTML="";
    load(name,false);
}

/* LOAD IMAGE */
async function load(name, shiny){
    try{
        let res = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
        let data = await res.json();

        let img = shiny ? data.sprites.front_shiny : data.sprites.front_default;

        document.getElementById("img").src = img;
        cacheImg = img;

    }catch{}
}

/* CALC */
function calc(){

    let name = document.getElementById("name").value;

    let atk = +document.getElementById("atk").value;
    let def = +document.getElementById("def").value;
    let hp = +document.getElementById("hp").value;

    let shiny=document.getElementById("shiny").checked;
    let shadow=document.getElementById("shadow").checked;
    let purified=document.getElementById("purified").checked;
    let lucky=document.getElementById("lucky").checked;
    let mega=document.getElementById("mega").checked;
    let gigantamax=document.getElementById("gigantamax").checked;
    let dynamax=document.getElementById("dynamax").checked;

    let iv = atk+def+hp;
    let pct = (iv*100)/45;

    let item={
        name, iv, pct,
        img:cacheImg,
        shiny,shadow,purified,lucky,mega,gigantamax,dynamax,
        date:new Date().toLocaleString()
    };

    history.push(item);
    history.sort((a,b)=>b.pct-a.pct);

    localStorage.setItem("ivs",JSON.stringify(history));

    document.getElementById("result").innerHTML=
    `${name} — ${iv}/45 (${Math.round(pct)}%)`;

    document.getElementById("bar").style.width=pct+"%";

    render();
}

/* RENDER */
function render(){
    let box=document.getElementById("history");
    if(!box) return;

    box.innerHTML="";

    history.forEach((p,i)=>{

        let tags="";

        if(p.shiny) tags+="⭐ Shiny<br>";
        if(p.shadow) tags+="🌑 Sombrio<br>";
        if(p.purified) tags+="💠 Purificado<br>";
        if(p.lucky) tags+="🍀 Sortudo<br>";
        if(p.mega) tags+="⚡ Mega<br>";
        if(p.gigantamax) tags+="🏔️ Gigantamax<br>";
        if(p.dynamax) tags+="💥 Dinamax<br>";

        box.innerHTML+=`
        <div class="item">
            <img src="${p.img}">
            <div>
                <b>${p.name}</b><br>
                ${p.iv}/45 (${Math.round(p.pct)}%)<br>
                <small>${p.date}</small><br>
                ${tags}
            </div>

            <button class="del" onclick="del(${i})">🗑️</button>
        </div>`;
    });
}

/* DELETE */
function del(i){
    history.splice(i,1);
    localStorage.setItem("ivs",JSON.stringify(history));
    render();
}

/* CLEAR */
function clearAll(){
    history=[];
    localStorage.removeItem("ivs");
    render();
}

render();

</script>

</body>
</html>
